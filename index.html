<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CROSSVIEW // Ground-Aerial Intelligence Platform</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --bg-primary: #0a0e14;
  --bg-secondary: #111820;
  --bg-tertiary: #1a2230;
  --bg-card: #151c28;
  --border: #2a3545;
  --border-accent: #3a4a5f;
  --text-primary: #e0e6ed;
  --text-secondary: #8899aa;
  --text-dim: #556677;
  --accent-amber: #f0a030;
  --accent-amber-dim: #c08020;
  --accent-green: #30d060;
  --accent-green-dim: #208040;
  --accent-red: #e04040;
  --accent-blue: #4090e0;
  --accent-cyan: #40c8d0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  height: 100vh;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  height: 48px;
}

.header-left { display: flex; align-items: center; gap: 12px; }

.logo {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 3px;
  color: var(--accent-amber);
}

.logo-sub {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
  font-family: 'JetBrains Mono', monospace;
}

.header-stats {
  display: flex;
  gap: 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}

.stat-item { display: flex; align-items: center; gap: 6px; }
.stat-label { color: var(--text-dim); }
.stat-value { color: var(--accent-cyan); font-weight: 500; }
.stat-value.green { color: var(--accent-green); }

.header-right { display: flex; align-items: center; gap: 12px; }

.mode-btn {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 4px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
}
.mode-btn:hover { border-color: var(--accent-amber-dim); color: var(--text-primary); }
.mode-btn.active {
  border-color: var(--accent-amber);
  color: var(--accent-amber);
  background: rgba(240,160,48,0.1);
}
.mode-btn.flagged {
  border-color: var(--accent-red);
  color: var(--accent-red);
  background: rgba(224,64,64,0.1);
}

.flag-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
}

.flag-btn {
  flex: 1;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 6px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
}
.flag-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }
.flag-btn.active {
  border-color: var(--accent-red);
  color: #fff;
  background: var(--accent-red);
}

.flag-type-select {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 5px 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  outline: none;
  flex: 1;
}

.flag-note {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 5px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  outline: none;
  flex: 2;
}
.flag-note::placeholder { color: var(--text-dim); }

.flagged-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  margin-bottom: 4px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent-red);
  cursor: pointer;
  transition: all 0.2s;
}
.flagged-item:hover { border-color: var(--accent-red); background: var(--bg-tertiary); }
.flagged-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 1px 5px;
  background: rgba(224,64,64,0.15);
  color: var(--accent-red);
  border: 1px solid rgba(224,64,64,0.3);
  white-space: nowrap;
}

.main { display: flex; height: calc(100vh - 48px); }

#map { flex: 1; background: var(--bg-primary); outline: none; }

.panel {
  width: 440px;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--accent-amber);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

.panel-content::-webkit-scrollbar { width: 4px; }
.panel-content::-webkit-scrollbar-track { background: var(--bg-secondary); }
.panel-content::-webkit-scrollbar-thumb { background: var(--border); }

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 40px;
  text-align: center;
}

.empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
.empty-state h3 { color: var(--text-secondary); font-size: 14px; font-weight: 500; margin-bottom: 8px; }
.empty-state p { color: var(--text-dim); font-size: 12px; line-height: 1.6; }

.target-card { padding: 16px; border-bottom: 1px solid var(--border); }

.target-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 10px; }

.target-name { font-weight: 600; font-size: 14px; color: var(--text-primary); }

.target-cat {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 2px 8px;
  background: rgba(240,160,48,0.15);
  color: var(--accent-amber);
  border: 1px solid rgba(240,160,48,0.3);
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.target-meta { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; }

.target-coords { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-secondary); }

.section-header {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  padding: 8px 16px;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
  border-top: 1px solid var(--border);
}

.imagery-section { padding: 12px 16px; }

.imagery-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.imagery-label.cyan { color: var(--accent-cyan); }
.imagery-label.amber { color: var(--accent-amber); }

.imagery-label .dot { width: 6px; height: 6px; border-radius: 50%; }
.imagery-label .dot.cyan { background: var(--accent-cyan); }
.imagery-label .dot.amber { background: var(--accent-amber); }

.aerial-container {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  margin-bottom: 4px;
  overflow: hidden;
}

.aerial-container img { width: 100%; height: 100%; object-fit: cover; }

.aerial-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 6px 10px;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-secondary);
}

.crossview-confidence {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}

.conf-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.conf-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  width: 100px;
}

.conf-bar {
  flex: 1;
  height: 6px;
  background: var(--bg-primary);
  border-radius: 3px;
  overflow: hidden;
}

.conf-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.conf-bar-fill.high { background: var(--accent-green); }
.conf-bar-fill.med { background: var(--accent-amber); }
.conf-bar-fill.low { background: var(--accent-red); }

.conf-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  width: 48px;
  text-align: right;
}

.ground-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 4px;
}

.ground-thumb {
  position: relative;
  aspect-ratio: 4/3;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
}

.ground-thumb:hover { border-color: var(--accent-amber); }
.ground-thumb img { width: 100%; height: 100%; object-fit: cover; }

.ground-thumb .rank {
  position: absolute;
  top: 4px;
  left: 4px;
  background: rgba(0,0,0,0.7);
  padding: 1px 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--accent-amber);
}

.similar-list { padding: 0 16px 16px; }

.similar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px;
  margin-bottom: 4px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
}

.similar-item:hover { border-color: var(--accent-amber-dim); background: var(--bg-tertiary); }

.similar-rank { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); width: 20px; text-align: center; }
.similar-info { flex: 1; min-width: 0; }
.similar-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.similar-meta { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
.similar-score { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; }

.search-box { padding: 8px 16px; border-bottom: 1px solid var(--border); }

.search-input {
  width: 100%;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 6px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  outline: none;
}

.search-input:focus { border-color: var(--accent-amber-dim); }
.search-input::placeholder { color: var(--text-dim); }

.leaflet-container { background: var(--bg-primary) !important; }

.leaflet-control-zoom a {
  background: var(--bg-secondary) !important;
  color: var(--text-primary) !important;
  border-color: var(--border) !important;
}

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 10000;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.modal-overlay.active { display: flex; }

.modal-overlay img {
  max-width: 90vw;
  max-height: 90vh;
  border: 1px solid var(--border);
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="logo">CROSSVIEW</div>
      <div class="logo-sub">GROUND-AERIAL INTELLIGENCE PLATFORM</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-item">
      <span class="stat-label">FACILITIES</span>
      <span class="stat-value" id="stat-targets">--</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">EMBEDDING</span>
      <span class="stat-value">256-d</span>
    </div>
  </div>
  <div class="header-right">
    <button class="mode-btn active" id="btn-explore" onclick="setMode('explore')">EXPLORE</button>
    <button class="mode-btn" id="btn-similar" onclick="setMode('similar')">FIND SIMILAR</button>
    <button class="mode-btn" id="btn-flagged" onclick="showFlagged()">&#9873; FLAGGED <span id="flag-count">0</span></button>
    <button class="mode-btn" id="btn-export" onclick="exportFlagged()" style="font-size:9px">EXPORT JSON</button>
  </div>
</div>

<div class="main">
  <div id="map"></div>
  <div class="panel" id="panel">
    <div class="panel-header">
      <span id="panel-title">BUILDING ANALYSIS</span>
      <span id="panel-status" style="color:var(--text-dim)">AWAITING SELECTION</span>
    </div>
    <div class="search-box">
      <input type="text" class="search-input" id="search" placeholder="SEARCH FACILITIES BY NAME, CATEGORY, ADDRESS...">
    </div>
    <div class="panel-content" id="panel-content">
      <div class="empty-state">
        <div class="icon">&#9678;</div>
        <h3>SELECT A FACILITY</h3>
        <p>Click any marker on the map or search above to begin cross-view analysis.<br><br>
        Cross-view embeddings predict ground-level appearance from overhead imagery.</p>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal()">
  <img id="modal-img" src="">
</div>

<script>
const CDN = 'https://zephr-mapillary-cache.s3.amazonaws.com/xvee-demo';
let DATA = null;
let map, markers = [], markerMap = {};
let selectedPoi = null;
let mode = 'explore';
let buildingLayer = null;
let similarMarkers = [];
let searchActive = false;

// Hard negative flagging — persisted in localStorage
let flaggedPois = JSON.parse(localStorage.getItem('crossview-flagged') || '{}');
function saveFlags() {
  localStorage.setItem('crossview-flagged', JSON.stringify(flaggedPois));
  document.getElementById('flag-count').textContent = Object.keys(flaggedPois).length;
  const btn = document.getElementById('btn-flagged');
  btn.classList.toggle('flagged', Object.keys(flaggedPois).length > 0);
}
function toggleFlag(poiId) {
  const typeEl = document.getElementById('flag-type');
  const noteEl = document.getElementById('flag-note');
  if (flaggedPois[poiId]) {
    delete flaggedPois[poiId];
  } else {
    const poi = DATA.pois.find(p => p.id === poiId);
    flaggedPois[poiId] = {
      type: typeEl ? typeEl.value : 'wrong_match',
      note: noteEl ? noteEl.value : '',
      sim: poi ? computeCrossViewSim(poi) : null,
      name: poi ? poi.name : '',
      cat: poi ? poi.cat : '',
      ts: new Date().toISOString(),
    };
  }
  saveFlags();
  // Update button appearance
  const btn = document.getElementById('flag-btn-main');
  if (btn) {
    btn.classList.toggle('active', !!flaggedPois[poiId]);
    btn.textContent = flaggedPois[poiId] ? '\u2691 FLAGGED' : '\u2691 FLAG FAILURE';
  }
}
function showFlagged() {
  const ids = Object.keys(flaggedPois);
  document.getElementById('panel-status').textContent = `${ids.length} FLAGGED`;
  document.getElementById('panel-status').style.color = 'var(--accent-red)';
  document.getElementById('panel-title').textContent = 'HARD NEGATIVE MINING';
  const content = document.getElementById('panel-content');
  if (ids.length === 0) {
    content.innerHTML = '<div class="empty-state"><h3>NO FLAGGED POIS</h3><p>Click a marker and use FLAG FAILURE to mark hard negatives for training.</p></div>';
    return;
  }
  content.innerHTML = '<div class="similar-list" style="padding-top:8px">' +
    ids.map(id => {
      const f = flaggedPois[id];
      const idx = DATA.pois.findIndex(p => p.id === id);
      return `
        <div class="flagged-item" onclick="selectTarget(${idx})">
          <div class="similar-info">
            <div class="similar-name">${f.name || 'UNNAMED'}</div>
            <div class="similar-meta">${f.note || f.type.replace(/_/g,' ')}</div>
          </div>
          <div class="flagged-type">${f.type.replace(/_/g,' ').toUpperCase()}</div>
          <div class="similar-score" style="color:var(--accent-red)">${f.sim ? (f.sim*100).toFixed(0)+'%' : '--'}</div>
        </div>`;
    }).join('') + '</div>';
}
function exportFlagged() {
  const ids = Object.keys(flaggedPois);
  if (ids.length === 0) { alert('No flagged POIs to export.'); return; }
  const exportData = ids.map(id => {
    const f = flaggedPois[id];
    const poi = DATA.pois.find(p => p.id === id);
    return {
      poi_id: id,
      flag_type: f.type,
      note: f.note,
      cross_view_sim: f.sim,
      name: f.name,
      category: f.cat,
      lat: poi ? poi.lat : null,
      lon: poi ? poi.lon : null,
      image_ids: poi ? poi.imgs : [],
      flagged_at: f.ts,
    };
  });
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `hard_negatives_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

const MARKER_DEFAULT  = { fillColor: '#40c8d0', fillOpacity: 0.7, color: 'rgba(255,255,255,0.3)', weight: 1 };
const MARKER_SELECTED = { fillColor: '#f0a030', fillOpacity: 1, color: '#f0a030', weight: 2 };
const MARKER_SIMILAR  = { fillColor: '#30d060', fillOpacity: 0.9, color: '#30d060', weight: 2 };

// Init map
map = L.map('map', {
  center: [40.015, -105.27],
  zoom: 13,
  zoomControl: true,
  attributionControl: false,
});

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
}).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  opacity: 0.7,
}).addTo(map);

// Load data
fetch(CDN + '/data/pois.json')
  .then(r => r.json())
  .then(data => {
    DATA = data;
    document.getElementById('stat-targets').textContent = data.pois.length.toLocaleString();
    initMarkers();
  });

function initMarkers() {
  DATA.pois.forEach((poi, idx) => {
    const marker = L.circleMarker([poi.elat || poi.lat, poi.elon || poi.lon], { ...MARKER_DEFAULT, radius: 5, interactive: false });
    marker.addTo(map);
    marker.poiIdx = idx;
    markers.push(marker);
    markerMap[poi.id] = marker;
  });

  // Single map click handler — find nearest POI within 20px
  map.on('click', function(e) {
    let bestIdx = -1, bestDist = Infinity;
    const clickPt = map.latLngToContainerPoint(e.latlng);
    for (let i = 0; i < markers.length; i++) {
      const mPt = map.latLngToContainerPoint(markers[i].getLatLng());
      const dx = clickPt.x - mPt.x, dy = clickPt.y - mPt.y;
      const dist = dx * dx + dy * dy;
      if (dist < bestDist) { bestDist = dist; bestIdx = i; }
    }
    if (bestIdx >= 0 && bestDist < 400) { // 20px radius = 400 squared
      clearSearch();
      selectTarget(bestIdx);
    }
  });
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-explore').classList.toggle('active', m === 'explore');
  document.getElementById('btn-similar').classList.toggle('active', m === 'similar');
  if (selectedPoi !== null) selectTarget(selectedPoi);
}

function selectTarget(idx) {
  clearSimilar();
  if (selectedPoi !== null) {
    updateMarkerStyle(selectedPoi, MARKER_DEFAULT);
  }
  selectedPoi = idx;
  updateMarkerStyle(idx, MARKER_SELECTED);

  const poi = DATA.pois[idx];
  map.setView([poi.elat || poi.lat, poi.elon || poi.lon], Math.max(map.getZoom(), 17), { animate: true, duration: 0.15 });

  // Building polygon
  if (buildingLayer) { map.removeLayer(buildingLayer); buildingLayer = null; }
  if (poi.bldg && poi.bldg.length > 0) {
    try {
      const coords = poi.bldg[0].map(c => [c[1], c[0]]);
      buildingLayer = L.polygon(coords, {
        color: '#f0a030',
        fillColor: '#f0a030',
        fillOpacity: 0.15,
        weight: 1.5,
        interactive: false,
      }).addTo(map);
    } catch(e) {}
  }

  renderTargetPanel(poi, idx);
}

function updateMarkerStyle(idx, style) {
  markers[idx].setStyle(style);
}

function computeCrossViewSim(poi) {
  // Cosine similarity between ground and aerial embeddings for this POI
  const gz = poi.gz, az = poi.az;
  let dot = 0, normG = 0, normA = 0;
  for (let d = 0; d < gz.length; d++) {
    dot += gz[d] * az[d];
    normG += gz[d] * gz[d];
    normA += az[d] * az[d];
  }
  return dot / (Math.sqrt(normG) * Math.sqrt(normA) + 1e-8);
}

function renderTargetPanel(poi, idx) {
  document.getElementById('panel-status').textContent = 'ACTIVE';
  document.getElementById('panel-status').style.color = 'var(--accent-green)';

  const cat = poi.cat ? poi.cat.replace(/_/g, ' ').toUpperCase() : 'UNKNOWN';
  const sim = computeCrossViewSim(poi);
  const simPct = (sim * 100).toFixed(1);
  const simClass = sim > 0.75 ? 'high' : sim > 0.5 ? 'med' : 'low';
  const simColor = sim > 0.75 ? 'var(--accent-green)' : sim > 0.5 ? 'var(--accent-amber)' : 'var(--accent-red)';

  const bearingIdx = Math.round(poi.bearing / 45) % 8;
  const bearingArrow = ['\u2191','\u2197','\u2192','\u2198','\u2193','\u2199','\u2190','\u2196'][bearingIdx];

  let html = `
    <div class="target-card">
      <div class="target-header">
        <div class="target-name">${poi.name || 'UNNAMED FACILITY'}</div>
        <div class="target-cat">${cat}</div>
      </div>
      <div class="target-meta">${poi.addr || 'NO ADDRESS'}</div>
      <div class="target-coords">
        ${poi.lat.toFixed(6)}N, ${Math.abs(poi.lon).toFixed(6)}W
        &nbsp;&bull;&nbsp; BRG ${Math.round(poi.bearing)}&deg; ${poi.cardinal} ${bearingArrow}
      </div>
    </div>

    <div class="crossview-confidence">
      <div class="conf-row">
        <div class="conf-label">CROSS-VIEW</div>
        <div class="conf-bar"><div class="conf-bar-fill ${simClass}" style="width:${simPct}%"></div></div>
        <div class="conf-value" style="color:${simColor}">${simPct}%</div>
      </div>
    </div>

    <div class="flag-row">
      <button class="flag-btn ${flaggedPois[poi.id] ? 'active' : ''}" id="flag-btn-main"
              onclick="toggleFlag('${poi.id}')">
        &#9873; ${flaggedPois[poi.id] ? 'FLAGGED' : 'FLAG FAILURE'}
      </button>
      <select class="flag-type-select" id="flag-type">
        <option value="wrong_match">WRONG MATCH</option>
        <option value="low_confidence">LOW CONFIDENCE</option>
        <option value="bad_image">BAD IMAGE</option>
        <option value="wrong_building">WRONG BUILDING</option>
        <option value="other">OTHER</option>
      </select>
      <input class="flag-note" id="flag-note" placeholder="optional note..." maxlength="100">
    </div>

    <div class="section-header" style="cursor:pointer" onclick="toggleSection('imagery-block')">
      CROSS-VIEW IMAGERY ${mode === 'similar' ? '<span style=\\"float:right;font-size:9px\\">&#9660; CLICK TO EXPAND</span>' : ''}
    </div>
    <div id="imagery-block" style="${mode === 'similar' ? 'display:none' : ''}">
      <div class="imagery-section">
        <div class="imagery-label cyan"><span class="dot cyan"></span>OVERHEAD NAIP AERIAL</div>
        <div class="aerial-container" style="aspect-ratio:4/3">
          <img src="${CDN}/thumbs/aerial/${poi.id}.jpg" alt="Aerial chip"
               style="width:100%;height:100%;object-fit:cover"
               onerror="this.style.display='none'">
          <div class="aerial-overlay">
            NAIP 0.6m GSD &bull; ${poi.lat.toFixed(5)}N ${Math.abs(poi.lon).toFixed(5)}W
          </div>
        </div>
      </div>

      <div class="section-header">PREDICTED GROUND-LEVEL APPEARANCE</div>
      <div class="imagery-section">
        <div class="imagery-label amber"><span class="dot amber"></span>STREET-LEVEL COLLECTION (${poi.imgs.length} IMAGES) &mdash; CLICK FOR HI-RES</div>
        <div class="ground-grid" style="grid-template-columns:repeat(${Math.min(poi.imgs.length, 3)}, 1fr)">
          ${poi.imgs.map((id, i) => `
            <div class="ground-thumb" onclick="openModal('${CDN}/fullres/${id}.jpg')">
              <div class="rank">#${i+1}</div>
              <img src="${CDN}/thumbs/ground/${id}.jpg" alt="Ground ${i+1}" onerror="this.parentElement.style.display='none'">
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;

  if (mode === 'similar') {
    const similar = computeSimilar(idx);
    html += `
      <div class="section-header" id="similar-section" style="color:var(--accent-green);border-top:2px solid var(--accent-green)">
        &#9733; SIMILAR FACILITIES BY AERIAL SIGNATURE (TOP 10)
      </div>
      <div class="similar-list" style="padding-top:8px">
        ${similar.map((s, rank) => {
          const pct = (s.sim * 100).toFixed(1);
          const dist = haversine(poi.lat, poi.lon, s.poi.lat, s.poi.lon);
          const distStr = dist < 1 ? (dist*1000).toFixed(0) + 'm' : dist.toFixed(1) + 'km';
          const scoreColor = s.sim > 0.75 ? 'var(--accent-green)' : s.sim > 0.5 ? 'var(--accent-amber)' : 'var(--accent-red)';
          return `
            <div class="similar-item" onclick="selectTarget(${s.idx})">
              <div class="similar-rank">${rank + 1}</div>
              <div class="similar-info">
                <div class="similar-name">${s.poi.name || 'UNNAMED'}</div>
                <div class="similar-meta">${(s.poi.cat || '').replace(/_/g,' ')} &bull; ${distStr}</div>
              </div>
              <div class="similar-score" style="color:${scoreColor}">${pct}%</div>
            </div>
          `;
        }).join('')}
      </div>
    `;

    // Highlight similar on map
    clearSimilar();
    similar.slice(0, 5).forEach(s => {
      updateMarkerStyle(s.idx, MARKER_SIMILAR);
      similarMarkers.push(s.idx);
    });
  }

  document.getElementById('panel-content').innerHTML = html;

  // Auto-scroll to similar section in similar mode
  if (mode === 'similar') {
    setTimeout(() => {
      const similarHeader = document.querySelector('#panel-content .section-header:last-of-type');
      if (similarHeader) similarHeader.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

function toggleSection(id) {
  const el = document.getElementById(id);
  if (!el) return;
  if (el.style.display === 'none') {
    el.style.display = '';
    el.previousElementSibling.querySelector('span[style]').innerHTML = '';
  } else {
    el.style.display = 'none';
    el.previousElementSibling.querySelector('span[style]').innerHTML = '&#9660; CLICK TO EXPAND';
  }
}

function computeSimilar(idx) {
  const poi = DATA.pois[idx];
  const az = poi.az;
  const scores = [];
  for (let i = 0; i < DATA.pois.length; i++) {
    if (i === idx) continue;
    const other = DATA.pois[i];
    let dot = 0, normA = 0, normB = 0;
    for (let d = 0; d < az.length; d++) {
      dot += az[d] * other.az[d];
      normA += az[d] * az[d];
      normB += other.az[d] * other.az[d];
    }
    scores.push({ idx: i, sim: dot / (Math.sqrt(normA) * Math.sqrt(normB) + 1e-8), poi: other });
  }
  scores.sort((a, b) => b.sim - a.sim);
  return scores.slice(0, 10);
}

function clearSimilar() {
  similarMarkers.forEach(idx => {
    if (idx !== selectedPoi) updateMarkerStyle(idx, MARKER_DEFAULT);
  });
  similarMarkers = [];
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function openModal(src) {
  document.getElementById('modal-img').src = src;
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

function clearSearch() {
  document.getElementById('search').value = '';
  if (searchActive) {
    searchActive = false;
    markers.forEach(m => m.setStyle({ fillOpacity: 0.7 }));
  }
}

// Search
document.getElementById('search').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();

  if (q.length < 2) {
    searchActive = false;
    markers.forEach(m => m.setStyle({ fillOpacity: 0.7 }));
    if (selectedPoi !== null) {
      renderTargetPanel(DATA.pois[selectedPoi], selectedPoi);
    } else {
      document.getElementById('panel-content').innerHTML = `
        <div class="empty-state">
          <div class="icon">&#9678;</div>
          <h3>SELECT A FACILITY</h3>
          <p>Click any marker on the map or search above.</p>
        </div>`;
      document.getElementById('panel-status').textContent = 'AWAITING SELECTION';
      document.getElementById('panel-status').style.color = 'var(--text-dim)';
    }
    return;
  }

  searchActive = true;
  const results = [];
  DATA.pois.forEach((poi, idx) => {
    const match = (poi.name || '').toLowerCase().includes(q) ||
                  (poi.cat || '').toLowerCase().replace(/_/g,' ').includes(q) ||
                  (poi.addr || '').toLowerCase().includes(q);
    markers[idx].setStyle({ fillOpacity: match ? 1 : 0.05 });
    if (match) results.push({ poi, idx });
  });

  document.getElementById('panel-status').textContent = `${results.length} MATCHES`;
  document.getElementById('panel-status').style.color = 'var(--accent-cyan)';

  const content = document.getElementById('panel-content');
  if (results.length === 0) {
    content.innerHTML = '<div class="empty-state"><h3>NO MATCHES</h3><p>Try a different search term.</p></div>';
  } else {
    content.innerHTML = '<div class="similar-list" style="padding-top:8px">' +
      results.slice(0, 50).map(r => `
        <div class="similar-item" onclick="clearSearch(); selectTarget(${r.idx});">
          <div class="similar-rank" style="color:var(--accent-cyan)">&#9678;</div>
          <div class="similar-info">
            <div class="similar-name">${r.poi.name || 'UNNAMED'}</div>
            <div class="similar-meta">${(r.poi.cat || '').replace(/_/g,' ')} &bull; ${r.poi.addr || ''}</div>
          </div>
        </div>
      `).join('') + '</div>';
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Init flag count
saveFlags();
</script>
